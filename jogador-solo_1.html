<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jogador Solo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050a0f;
      --surface: #0d1b2a;
      --border: #1a3a5c;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --pix: #32d477;
      --yt: #ff0000;
      --text: #e0eaf5;
      --muted: #5a7a9a;
      --glow: 0 0 20px rgba(0, 212, 255, 0.4);
      --glow2: 0 0 20px rgba(255, 107, 53, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Exo 2', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.2rem;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow behind content */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
    }

    /* Avatar / Logo area */
    .avatar-ring {
      position: relative;
      width: 100px;
      height: 100px;
      animation: fadeDown 0.8s ease both;
    }

    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      animation: spin 4s linear infinite;
    }

    .avatar-ring::after {
      content: '🎮';
      position: absolute;
      inset: 4px;
      background: var(--bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      z-index: 1;
      line-height: 1;
      display: grid;
      place-items: center;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Header text */
    .header {
      text-align: center;
      animation: fadeDown 0.9s ease 0.1s both;
    }

    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 12px rgba(0,212,255,0.5));
    }

    .header p {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      animation: fadeDown 1s ease 0.2s both;
    }

    /* Link Cards */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.3rem;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 12px;
    }

    .link-card:hover {
      transform: translateY(-3px) scale(1.01);
    }

    /* PIX card */
    .card-pix { animation: fadeUp 0.7s ease 0.3s both; }
    .card-pix:hover { border-color: var(--pix); box-shadow: 0 0 24px rgba(50,212,119,0.3); }
    .card-pix .icon-wrap { background: rgba(50,212,119,0.12); color: var(--pix); }
    .card-pix .label-sub { color: var(--pix); }

    /* YouTube card */
    .card-yt { animation: fadeUp 0.7s ease 0.45s both; }
    .card-yt:hover { border-color: var(--yt); box-shadow: 0 0 24px rgba(255,0,0,0.25); }
    .card-yt .icon-wrap { background: rgba(255,0,0,0.12); color: var(--yt); }
    .card-yt .label-sub { color: var(--yt); }

    /* Kick card */
    .card-kick { animation: fadeUp 0.7s ease 0.55s both; }
    .card-kick:hover { border-color: #53fc18; box-shadow: 0 0 24px rgba(83,252,24,0.25); }
    .card-kick .icon-wrap { background: rgba(83,252,24,0.10); color: #53fc18; }
    .card-kick .label-sub { color: #53fc18; }

    /* TikTok card */
    .card-tiktok { animation: fadeUp 0.7s ease 0.65s both; }
    .card-tiktok:hover { border-color: #ff0050; box-shadow: 0 0 24px rgba(255,0,80,0.25), 4px 0 16px rgba(0,242,234,0.2); }
    .card-tiktok .icon-wrap { background: rgba(255,0,80,0.10); color: #ff0050; }
    .card-tiktok .label-sub { color: #ff0050; }

    /* Twitch card */
    .card-twitch { animation: fadeUp 0.7s ease 0.75s both; }
    .card-twitch:hover { border-color: #9147ff; box-shadow: 0 0 24px rgba(145,71,255,0.35); }
    .card-twitch .icon-wrap { background: rgba(145,71,255,0.12); color: #9147ff; }
    .card-twitch .label-sub { color: #9147ff; }

    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }

    .link-card:hover .icon-wrap {
      transform: scale(1.1) rotate(-4deg);
    }

    .card-text {
      flex: 1;
    }

    .label-main {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .label-sub {
      font-size: 0.75rem;
      margin-top: 0.15rem;
      opacity: 0.85;
      letter-spacing: 0.04em;
    }

    .arrow {
      font-size: 1.1rem;
      opacity: 0.4;
      transition: opacity 0.2s, transform 0.2s;
    }

    .link-card:hover .arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* Section label */
    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      align-self: flex-start;
      animation: fadeDown 1s ease 0.25s both;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
      opacity: 0.6;
      animation: fadeUp 1s ease 0.6s both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Scanline overlay for vibe */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 99;
    }
  </style>
</head>
